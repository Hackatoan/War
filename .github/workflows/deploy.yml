env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}

      - name: Trigger deploy
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_AGENT_URL }}
          DEPLOY_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "${{ github.event.repository.name }}" \
            --arg image "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest" \
            '{"repoName": $repo, "image": $image}')

          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$DEPLOY_SECRET" | awk '{print $2}')"

          curl -f -X POST "$DEPLOY_URL" \
            -H "Content-Type: application/json" \
            -H "x-deploy-signature: $SIGNATURE" \
            -d "$PAYLOAD"
